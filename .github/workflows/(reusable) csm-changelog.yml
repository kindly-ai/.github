name: "(Reusable) CSM Changelog"

on:
  workflow_call:
    inputs:
      anthropic-model:
        description: "Anthropic model used to decide and summarize CSM-visible release notes."
        required: false
        type: string
        default: "claude-sonnet-4-6"
    secrets:
      slack-webhook-url:
        description: "Incoming Slack webhook URL for the CSM changelog channel."
        required: true
      anthropic-api-key:
        description: "Anthropic API key used to generate CSM changelog summaries."
        required: true

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  post-csm-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous release tag
        id: previous_release
        uses: actions/github-script@v8
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 2
            });

            if (releases.data.length < 2) {
              core.info('No previous release found.');
              return;
            }

            core.setOutput('tag_name', releases.data[1].tag_name);

      - name: Get PR numbers in release
        id: pr_numbers
        if: steps.previous_release.outputs.tag_name
        run: |
          prev_tag=${{ steps.previous_release.outputs.tag_name }}
          current_tag=${{ github.ref_name }}
          pr_numbers=$(git log "$prev_tag..$current_tag" --pretty=%s | grep -oE '\(#[0-9]+\)' | grep -oE '[0-9]+' || true)
          pr_numbers_json=$(printf '%s\n' "$pr_numbers" | jq -scR 'split("\n") | map(select(length > 0)) | map(tonumber) | unique')
          echo "numbers=${pr_numbers_json}" >> "$GITHUB_OUTPUT"

      - name: Checkout reusable workflow repository
        if: steps.pr_numbers.outputs.numbers && steps.pr_numbers.outputs.numbers != '[]'
        uses: actions/checkout@v4
        with:
          repository: kindly-ai/.github
          ref: master
          path: .github-csm-changelog

      - name: Summarize released PRs and post CSM changelog to Slack
        if: steps.pr_numbers.outputs.numbers && steps.pr_numbers.outputs.numbers != '[]'
        uses: ./.github-csm-changelog/.github/actions/csm-changelog
        env:
          ANTHROPIC_API_KEY: ${{ secrets.anthropic-api-key }}
          SLACK_WEBHOOK_URL: ${{ secrets.slack-webhook-url }}
        with:
          pr-numbers: ${{ steps.pr_numbers.outputs.numbers }}
          anthropic-model: ${{ inputs.anthropic-model }}
